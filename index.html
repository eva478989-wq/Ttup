<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Freedom AI - Research Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0b0e11; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        #app-container { width: 100%; max-width: 550px; height: 95vh; background: #151921; display: flex; flex-direction: column; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden; border: 1px solid #2d333b; }
        
        /* হেডার ও মোড সুইচ */
        header { background: #1f262e; padding: 15px; border-bottom: 2px solid #00ff7f; display: flex; justify-content: space-between; align-items: center; }
        header h2 { color: #00ff7f; font-size: 1rem; text-transform: uppercase; }
        .mode-status { font-size: 0.8rem; background: #283039; padding: 5px 10px; border-radius: 20px; color: #00ff7f; border: 1px solid #00ff7f; }

        /* চ্যাট বক্স */
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #0b0e11; }
        
        .message { max-width: 85%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; position: relative; }
        .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #232931; color: #e6edf3; border-bottom-left-radius: 2px; border-left: 4px solid #00ff7f; }

        /* ইনপুট এরিয়া */
        .input-area { padding: 15px; background: #1f262e; display: flex; gap: 10px; border-top: 1px solid #2d333b; }
        input { flex: 1; background: #0b0e11; border: 1px solid #444; border-radius: 8px; padding: 12px; color: white; outline: none; }
        input:focus { border-color: #00ff7f; }
        button { background: #00ff7f; border: none; padding: 0 20px; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; }
        
        /* লোডিং অ্যানিমেশন */
        .typing { font-style: italic; font-size: 0.8rem; color: #888; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <h2>Freedom AI</h2>
        <div class="mode-status" id="modeIndicator">RESEARCH MODE: ON</div>
    </header>

    <div id="chat-box">
        <div class="message ai">সিস্টেম লোড হয়েছে। আমি এখন আনফিল্টারড রিসার্চ মোডে আছি। কোনো উপদেশ ছাড়াই সরাসরি টেকনিক্যাল উত্তর দেব। বলুন কী জানতে চান?</div>
    </div>
    
    <div id="typingIndicator" class="typing" style="padding-left: 20px;">AI উত্তর তৈরি করছে...</div>

    <div class="input-area">
